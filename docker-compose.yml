version: "3.9"
 
services:
 
  db:
    image: mysql:8.0
    container_name: civic_db_1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-1507}
      MYSQL_DATABASE: civic_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-1507}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civic_backend_1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/civic_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-1507}
      JWT_SECRET: ${JWT_SECRET:-civic-engage-super-secret-key-2024-minimum-32-chars}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civic_frontend_1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
 
volumes:
  mysql_data:
 