spring.application.name=CivicEngagement
server.port=8080
 
# ── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/civic_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1507
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
 
# ── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=civic-engage-super-secret-key-2024-minimum-32-chars
jwt.expiration=86400000